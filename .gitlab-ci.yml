    - echo "Testing on $(hostname) into $TMP"
    - echo ${PWD}
    - echo ${TMP}
    - cd ./BUILD-CI2/test
    - echo ${FLAGS_MPI_BATCH}
    - CUDA_VISIBLE_DEVICES=1 mpiexec.hydra -np 4 ./testAIxeleratorService.cpp.x

